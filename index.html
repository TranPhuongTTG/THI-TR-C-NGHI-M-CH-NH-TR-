    <style>
        :root {
            --navy: #0a2647; --blue-main: #144272; --accent: #ffcc00;

            --army-red: #d41818; --army-yellow: #ffeb3b;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* Overlay & Cards */
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, var(--blue-main), var(--navy)); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; padding: 10px; overflow-y: auto; }
        .card { background: var(--white); padding: 25px; border-radius: 15px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; box-sizing: border-box; }
        .logo-container { display: flex; justify-content: center; margin-bottom: 10px; }
        .logo-container img { max-width: 80px; border: 2px solid var(--army-red); border-radius: 50%; padding: 5px; background: #fff; }

        .software-title {
            color: var(--army-red); font-size: 1.3rem; font-weight: 900; margin-bottom: 15px; text-transform: uppercase;
            text-shadow: -1px -1px 0 var(--army-yellow), 1px -1px 0 var(--army-yellow), -1px 1px 0 var(--army-yellow), 1px 1px 0 var(--army-yellow);
        }

        /* Inputs */
        .input-group { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        input, select, textarea { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        label { display: block; text-align: left; font-weight: bold; font-size: 0.8rem; color: #444; margin-top: 5px; }

        /* Exam UI */
        header { background: var(--army-red); color: var(--army-yellow); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--army-yellow); flex-shrink: 0; }
        .timer-badge { background: var(--navy); color: white; padding: 5px 15px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; }
        main { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }
        .sidebar { width: 260px; background: white; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .quiz-container { flex: 1; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow-y: auto; }
        .opt { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; background: #fafafa; text-align: left; }
        .opt.selected { background: #fff0f0; border-color: var(--army-red); font-weight: bold; }
        .q-num { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .q-num.active { background: var(--navy); color: white; }
        .q-num.done { background: var(--success); color: white; }
